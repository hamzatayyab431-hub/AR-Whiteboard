services:
  ar-whiteboard:
    container_name: ar_whiteboard_app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database file
      - ./ar_whiteboard.db:/app/ar_whiteboard.db
      # Persist exported media session files
      - whiteboard_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///ar_whiteboard.db
      - OCR_ENGINE=easyocr
    restart: unless-stopped

volumes:
  whiteboard_data:
